name: XORAS Intelligence Core
on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Select Intelligence Tier'
        required: true
        default: 'EDGE_3B'
        type: choice
        options:
          - EDGE_3B
          - REASONER_12B
          - APEX_120B

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Initialize Intelligence Tier
        run: |
          echo "🧠 Initializing XORAS Intelligence Tier: ${{ github.event.inputs.tier }}..."
          node intelligence_core/orchestrator.js --tier ${{ github.event.inputs.tier }}

      - name: Scour Open Avenues (Scout Mode)
        run: |
          echo "🔍 Scouring GitHub for Intelligence Signals..."
          node intelligence_core/scout.js

      - name: Generate Audit Finality
        run: |
          echo "✅ Audit Complete. Finality recorded in intelligence_core/AUDIT_FINALITY.md"
