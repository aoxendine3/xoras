name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  zizmor:
    name: Zizmor Workflow Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Zizmor Audit
        uses: woodruffw/zizmor-action@072186716075191c0e3592c7309068032ec88313 # v0.1.1
        with:
          arguments: .github/workflows/ --format plain

  actionlint:
    name: Actionlint Syntax Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Actionlint
        uses: rhysd/actionlint-action@7005470d062828e678396c21e6be3f48a1d1354a # v1.11.1
        with:
          flags: -color
