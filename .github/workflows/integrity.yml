name: Release Integrity

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: XORAS Release Integrity
        uses: aoxendine3/xoras/action@main
        with:
          mode: ADVISORY
